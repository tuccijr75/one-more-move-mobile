workflows:
  # ============================================
  # ANDROID WORKFLOW
  # ============================================
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22
      java: 17
      android_signing:
        - OneMoreMove
      groups:
        - android_credentials  # Optional: env vars for versioning etc.
      vars:
        PACKAGE_NAME: "com.onemoremove.app"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build

      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android

      - name: Set Android version
        script: |
          LATEST_BUILD_NUMBER=$((${BUILD_NUMBER:-1}))
          cd android
          echo "android.defaults.buildToolsVersion=34.0.0" >> gradle.properties
          sed -i '' "s/versionCode [0-9]*/versionCode $LATEST_BUILD_NUMBER/" app/build.gradle 2>/dev/null || true
          sed -i '' "s/versionName \"[^\"]*\"/versionName \"1.0.$LATEST_BUILD_NUMBER\"/" app/build.gradle 2>/dev/null || true

      - name: Build Android APK & AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com  # Replace with your email
        notify:
          success: true
          failure: true
      # Uncomment below after setting up Google Play credentials in Codemagic
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal

  # ============================================
  # iOS WORKFLOW
  # ============================================
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store  # or "development" for testing
        bundle_identifier: com.onemoremove.app
      groups:
        - appstore_credentials  # Optional: App Store Connect API key
      vars:
        BUNDLE_ID: "com.onemoremove.app"
        APP_NAME: "One More Move"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build

      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set iOS version
        script: |
          LATEST_BUILD_NUMBER=$((${BUILD_NUMBER:-1}))
          cd ios/App
          agvtool new-version -all $LATEST_BUILD_NUMBER
          agvtool new-marketing-version "1.0.$LATEST_BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com  # Replace with your email
        notify:
          success: true
          failure: true
      # Uncomment below after setting up App Store Connect API key in Codemagic
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
